openapi: 3.0.3
info:
  title: Context API
  version: 1.0.0
  description: >
    Supabase Edge Function for updating the current goal of the active chat conversation.
    This API uses an action-based request body and a custom API key header for authentication.
servers:
  - url: https://bwyamrnvijnwzgljhwqo.supabase.co
paths:
  /functions/v1/context-api:
    post:
      operationId: contextApi
      summary: Execute a context action
      description: >
        Call the Supabase Edge Function with an action and params object.
        For Dify, use the X-Planning-Api-Key header instead of Authorization.
      security:
        - PlanningApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContextRequest'
            examples:
              setCurrentGoal:
                summary: Set the current goal for the active chat conversation
                value:
                  action: set_current_goal
                  params:
                    conversation_id: 00000000-0000-0000-0000-000000000000
                    goal_id: 00000000-0000-0000-0000-000000000000
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: Validation or unknown-action error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
components:
  securitySchemes:
    PlanningApiKey:
      type: apiKey
      in: header
      name: X-Planning-Api-Key
  schemas:
    ContextRequest:
      type: object
      required:
        - action
      properties:
        action:
          type: string
          enum:
            - set_current_goal
          description: Action to execute.
        params:
          type: object
          description: Action-specific parameters.
          properties:
            conversation_id:
              type: string
            goal_id:
              type: string
              nullable: true
          required:
            - conversation_id
          additionalProperties: true
      additionalProperties: false
    ApiError:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          nullable: true
      required:
        - code
        - message
    ApiResponse:
      type: object
      properties:
        ok:
          type: boolean
        data:
          nullable: true
        error:
          oneOf:
            - $ref: '#/components/schemas/ApiError'
            - type: 'null'
      required:
        - ok
        - data
        - error
